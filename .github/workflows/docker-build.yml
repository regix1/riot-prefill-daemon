name: build-and-docker
run-name: "Build and Push Docker Image"

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  PROJECT_NAME: RiotPrefill
  REGISTRY: ghcr.io
  IMAGE_NAME: regix1/riot-prefill-daemon
  # Safety net: force any residual Node20 JS actions to run on Node24
  # (Node20 is deprecated by GitHub Actions as of 2026-06-16).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            runtime: linux-x64
          # arm64 builds NATIVELY on a GitHub-hosted arm64 runner (much faster
          # than QEMU emulation). FlatSharp.Compiler bundles an x86-64 'flatc'
          # that cannot exec on arm64 (Exec format error), so the "Replace
          # bundled flatc" step below swaps in the OS-native arm64 flatc
          # (apt flatbuffers-compiler 23.5.26 matches FlatSharp 7.6.0's flatc).
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            runtime: linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      # The build runs NATIVELY on arm64, but FlatSharp.Compiler 7.6.0 bundles
      # ONLY an x86-64 'flatc' (its nuget ships linux/x64, macos, windows — no
      # linux-arm64 build), and that flatc is a FlatSharp-specific fork that
      # accepts flags stock distro flatc rejects (e.g. --bfbs-absolute-paths),
      # so apt's flatbuffers-compiler is NOT a drop-in. Instead register
      # qemu-user-static via binfmt so the bundled x86-64 flatc transparently
      # executes during the FlatSharp codegen step. Only that tiny codegen
      # subprocess is emulated — the .NET build/publish and Docker build all
      # stay native arm64.
      - name: Enable x86-64 binfmt for bundled flatc (arm64 only)
        if: matrix.platform == 'linux/arm64'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          # Verify the bundled x86-64 flatc can now exec under emulation.
          flatc_bin="$(find "$HOME/.nuget/packages/flatsharp.compiler" -path '*/net8.0/flatc/linux/flatc' -type f | head -n1)"
          echo "Bundled flatc: $flatc_bin"
          chmod +x "$flatc_bin"
          "$flatc_bin" --version

      - name: Build
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=false

      - name: Publish
        run: |
          mkdir -p publish/$(echo ${{ matrix.platform }} | sed 's/linux\///')
          dotnet publish ${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.csproj --configuration Release -o publish/$(echo ${{ matrix.platform }} | sed 's/linux\///') --self-contained --runtime ${{ matrix.runtime }} /p:TreatWarningsAsErrors=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.runtime }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
